<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumo de Integración · PcCom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e1117; --surface:#161b22; --surface2:#1c2230; --border:#2a3140;
    --text:#e6edf3; --text-dim:#8b949e;
    --accent:#f97316; --accent-dim:rgba(249,115,22,0.15);
    --blue:#3b82f6; --blue-dim:rgba(59,130,246,0.14);
    --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .header{display:flex;align-items:center;gap:12px;padding:20px 32px;border-bottom:1px solid var(--border);}
  .back-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);text-decoration:none;flex-shrink:0;transition:all 0.2s;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent);}
  .logo{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#fb923c);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;}
  .header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px;flex:1;}
  .header h1 span{color:var(--accent);}
  .header-meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .main{padding:24px 32px;display:flex;flex-direction:column;gap:18px;}
  .ctrl-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .ctrl-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;white-space:nowrap;}
  .toggle-group{display:flex;}
  .toggle-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:7px 16px;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;font-weight:500;}
  .toggle-btn:first-child{border-radius:8px 0 0 8px;}
  .toggle-btn:last-child{border-radius:0 8px 8px 0;}
  .toggle-btn:not(:first-child){margin-left:-1px;}
  .toggle-btn:hover{border-color:var(--accent);color:var(--accent);z-index:1;}
  .toggle-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600;z-index:1;}
  .year-btn.active{background:var(--blue-dim)!important;border-color:var(--blue)!important;color:var(--blue)!important;}
  .year-btn:hover{border-color:var(--blue)!important;color:var(--blue)!important;}
  .familia-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .fam-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;white-space:nowrap;}
  .fam-btn:hover{border-color:var(--blue);color:var(--blue);}
  .fam-btn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);font-weight:600;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;}
  .chart-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px;}
  .chart-title{font-size:15px;font-weight:600;}
  .chart-title span{color:var(--blue);}
  .chart-subtitle{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .chart-total{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);}
  .bars{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
  .bar-row{display:grid;grid-template-columns:160px 1fr 72px;align-items:center;gap:12px;}
  .bar-label{font-size:12.5px;font-weight:500;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
  .bar-track{height:28px;background:var(--surface2);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;transition:width 0.45s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:10px;}
  .bar-fill-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .bar-pct{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:right;}
  .no-data{padding:40px;text-align:center;color:var(--text-dim);font-size:14px;}
  @media(max-width:900px){.header,.main{padding:16px;}.bar-row{grid-template-columns:110px 1fr 56px;}}
</style>
</head>

const ANOS = ['2023','2024','2025','2026'];
const MESES_LABEL = {'01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic'};
const FAMILIAS = ['Discos Duros','Fuentes Alimentación','Placas Base','Refrigeración Líquida','Tarjetas Gráficas','Tarjetas de Red','Ventiladores CPU','Ventiladores Suplementarios','memorias','procesadores','torres atx'];
const PALETTE = ['#3b82f6','#f97316','#22c55e','#a855f7','#ec4899','#eab308','#06b6d4','#ef4444','#8b5cf6','#14b8a6','#f59e0b','#10b981','#6366f1','#f43f5e','#84cc16','#64748b','#0ea5e9','#d946ef'];
const brandColor = {};
let colorIdx = 0;
function getColor(marca){if(!brandColor[marca])brandColor[marca]=PALETTE[colorIdx++%PALETTE.length];return brandColor[marca];}
const allBrands=[...new Set(Object.values(DATA).flatMap(y=>Object.values(y).flatMap(f=>Object.values(f).flatMap(m=>Object.keys(m)))))].sort();
allBrands.forEach(b=>getColor(b));

let selAno='2026', selMes='all', selFamilia='Tarjetas Gráficas';

function getMeses(ano){const fd=DATA[ano]?.[selFamilia]||{};return Object.keys(fd).sort();}

function init(){buildYear();buildMes();buildFamilias();render();}

function buildYear(){
  document.getElementById('yearGroup').innerHTML=ANOS.map(a=>`<button class="toggle-btn year-btn ${a===selAno?'active':''}" onclick="setAno('${a}',this)">${a}</button>`).join('');
}

function buildMes(){
  const meses=getMeses(selAno);
  if(selMes!=='all'&&!meses.includes(selMes))selMes='all';
  const opts=[['all','Global'],...meses.map(m=>[m,MESES_LABEL[m]||m])];
  document.getElementById('mesGroup').innerHTML=opts.map(([v,l])=>`<button class="toggle-btn ${v===selMes?'active':''}" onclick="setMes('${v}',this)">${l}</button>`).join('');
}

function buildFamilias(){
  document.getElementById('familiaGrid').innerHTML=FAMILIAS.map(f=>`<button class="fam-btn ${f===selFamilia?'active':''}" onclick="setFamilia('${f}',this)">${f}</button>`).join('');
}

function setAno(ano,btn){selAno=ano;document.querySelectorAll('.year-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildMes();render();}
function setMes(mes,btn){selMes=mes;document.querySelectorAll('#mesGroup .toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function setFamilia(f,btn){selFamilia=f;document.querySelectorAll('.fam-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildMes();render();}

function render(){
  const container=document.getElementById('barsContainer');
  const famData=DATA[selAno]?.[selFamilia];
  if(!famData){container.innerHTML='<div class="no-data">Sin datos para este año y familia</div>';document.getElementById('chartTotal').textContent='—';return;}
  const totals={};
  const meses=selMes==='all'?Object.keys(famData):[selMes];
  meses.forEach(m=>{if(!famData[m])return;Object.entries(famData[m]).forEach(([marca,uds])=>{totals[marca]=(totals[marca]||0)+uds;});});
  if(!Object.keys(totals).length){container.innerHTML='<div class="no-data">Sin datos para el período seleccionado</div>';document.getElementById('chartTotal').textContent='—';return;}
  const totalUds=Object.values(totals).reduce((s,v)=>s+v,0);
  const rows=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const mesLabel=selMes==='all'?'Global (año completo)':`${MESES_LABEL[selMes]||selMes} ${selAno}`;
  document.getElementById('chartFamilia').textContent=selFamilia;
  document.getElementById('chartPeriodo').textContent=`${selAno} · ${mesLabel}`;
  document.getElementById('chartTotal').textContent=`${totalUds.toLocaleString('es-ES')} uds totales`;
  container.innerHTML=rows.map(([marca,uds])=>{
    const pct=uds/totalUds*100;
    const pctStr=pct.toFixed(1)+'%';
    const color=getColor(marca);
    const showLabel=pct>5;
    return `<div class="bar-row"><div class="bar-label">${marca}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${showLabel?`<span class="bar-fill-label">${pctStr} · ${uds.toLocaleString('es-ES')}</span>`:''}</div></div><div class="bar-pct" style="color:${color}">${pctStr}</div></div>`;
  }).join('');
}
