<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PcCom Dashboards — Índice</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0b0d10; --surface:#15181c; --surface2:#1c2026; --border:#2a2f36;
    --text:#eceeef; --text-dim:#8b9097;
    --stone:#9da0a2; --stone-dim:rgba(157,160,162,0.14);
    --bolt:#fc671a; --bolt-dim:rgba(252,103,26,0.16);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    position:relative; overflow-x:hidden;
  }

  .bolt-bg{
    position:fixed; top:-8%; right:-6%; width:46vw; max-width:620px;
    opacity:0.05; pointer-events:none; z-index:0;
  }

  .header{
    position:relative; z-index:1;
    display:flex; align-items:center; gap:18px;
    padding:34px 48px; border-bottom:1px solid var(--border);
  }
  .mark{ height:40px; width:auto; flex-shrink:0; }
  .header-text h1{
    font-family:'Space Grotesk',sans-serif; font-size:21px; font-weight:700;
    letter-spacing:-0.4px; text-transform:uppercase;
  }
  .header-text h1 .cut{ color:var(--bolt); }
  .header-meta{font-size:12.5px;color:var(--text-dim);margin-top:3px;letter-spacing:0.2px;}

  .main{position:relative; z-index:1; padding:48px; max-width:1280px; margin:0 auto;}

  .section-label{
    display:flex; align-items:center; gap:10px;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:1.4px; font-weight:500;
    margin-bottom:22px;
  }
  .section-label::before{
    content:''; width:14px; height:8px; background:var(--bolt);
    clip-path:polygon(18% 0, 100% 0, 82% 100%, 0% 100%);
    flex-shrink:0;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:18px;
  }

  .card{
    --cut:22px;
    background:var(--surface); border:1px solid var(--border);
    clip-path:polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%, 0 100%);
    padding:26px 26px 22px 26px;
    text-decoration:none; color:var(--text);
    display:flex; flex-direction:column; gap:14px;
    transition:border-color 0.2s, transform 0.15s, background 0.2s;
    position:relative;
  }
  .card:hover{
    border-color:var(--card-color, var(--bolt));
    transform:translateY(-3px);
    background:var(--surface2);
  }
  .card::before{
    content:''; position:absolute; top:0; left:0;
    width:34px; height:4px; background:var(--card-color, var(--bolt));
  }

  .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}

  .card-icon{
    width:42px; height:42px;
    background:var(--card-color-dim, var(--bolt-dim));
    clip-path:polygon(20% 0, 100% 0, 80% 100%, 0% 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:19px; flex-shrink:0;
  }

  .card-num{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
    letter-spacing:0.5px; padding-top:4px;
  }

  .card-title{
    font-family:'Space Grotesk',sans-serif; font-size:16.5px; font-weight:600; letter-spacing:-0.2px;
  }
  .card-desc{font-size:12.5px; color:var(--text-dim); line-height:1.55; flex:1;}

  .card-footer{
    display:flex; align-items:center; justify-content:space-between;
    padding-top:12px; border-top:1px solid var(--border);
    font-size:11px; color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
  }
  .card-footer .updated{display:flex; align-items:center; gap:6px;}
  .card-footer .arrow{
    color:var(--card-color, var(--bolt)); font-weight:600; font-size:12.5px;
    font-family:'DM Sans',sans-serif;
    transition:transform 0.15s;
  }
  .card:hover .arrow{transform:translateX(4px);}

  .card-placeholder{
    --cut:22px;
    background:transparent;
    border:1.5px dashed var(--border);
    clip-path:polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%, 0 100%);
    padding:26px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:var(--text-dim); min-height:172px;
  }
  .card-placeholder .plus{
    font-family:'Space Grotesk',sans-serif; font-size:24px; opacity:0.45; color:var(--stone);
  }
  .card-placeholder .label{font-size:12px; text-align:center; line-height:1.5;}

  .footer{
    position:relative; z-index:1;
    padding:28px 48px; border-top:1px solid var(--border);
    font-size:11.5px; color:var(--text-dim); text-align:center;
    font-family:'JetBrains Mono',monospace; letter-spacing:0.3px;
  }

  @media(max-width:700px){
    .header,.main,.footer{padding:24px;}
    .grid{grid-template-columns:1fr;}
    .bolt-bg{display:none;}
  }
</style>
</head>
<body>

<svg class="bolt-bg" viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg">
  <path d="M 270 0 L 370 0 L 240 270 L 400 270 L 130 700 L 220 380 L 60 380 Z" fill="#9da0a2"/>
</svg>

<div class="header">
  <img class="mark" src="pccom_bolt.png" alt="PcCom">
  <div class="header-text">
    <h1>PcCom<span class="cut"> / </span>Dashboards</h1>
    <div class="header-meta">Índice de herramientas internas · PcComponentes Sobremesa</div>
  </div>
</div>

<div class="main">
  <div class="section-label">Campañas y ventas</div>
  <div class="grid" id="grid"></div>
</div>

<div class="footer">PCCOMPONENTES — HERRAMIENTAS INTERNAS PCCOM SOBREMESA</div>

<script>
const DASHBOARDS = [
  {
    icon: '📦',
    title: 'PcDays 2026',
    desc: 'Control de ventas de la campaña PcDays: unidades ofertadas vs. vendidas, resumen por gama y referencias fuera de campaña.',
    url: 'dashboard_pcdays_2026.html',
    updated: '2026-06-30',
    color: '#fc671a',
    colorDim: 'rgba(252,103,26,0.16)'
  },
  {
    icon: '📊',
    title: 'Ventas por Horas',
    desc: 'Comparativa de ventas hora a hora entre dos días, con acumulados, GMV y desglose por país y marca.',
    url: 'dashboard_sobremesa_horaxhora.html',
    updated: '2026-06-30',
    color: '#9da0a2',
    colorDim: 'rgba(157,160,162,0.16)'
  },
  {
    icon: '🔧',
    title: 'Consumo de Integración',
    desc: 'Cuota % de unidades por marca y familia de componente. Filtrable por año (2023–2026) y mes.',
    url: 'dashboard_consumo_integracion.html',
    updated: '2026-07-01',
    color: '#22c55e',
    colorDim: 'rgba(34,197,94,0.16)'
  },
];

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).replace('.', '').toUpperCase();
}

function render() {
  const grid = document.getElementById('grid');

  let html = DASHBOARDS.map((d, i) => `
    <a class="card" href="${d.url}" style="--card-color:${d.color};--card-color-dim:${d.colorDim}">
      <div class="card-top">
        <div class="card-icon">${d.icon}</div>
        <div class="card-num">${String(i + 1).padStart(2, '0')}</div>
      </div>
      <div class="card-title">${d.title}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-footer">
        <span class="updated">⟡ ${formatDate(d.updated)}</span>
        <span class="arrow">Abrir →</span>
      </div>
    </a>
  `).join('');

  html += `
    <div class="card-placeholder">
      <div class="plus">+</div>
      <div class="label">Próximo dashboard<br>se añadirá aquí</div>
    </div>
  `;

  grid.innerHTML = html;
}

render();
</script>

</body>
</html>
