<script>
const DASHBOARDS = [
  {
    icon: '📦',
    title: 'PcDays 2026',
    desc: 'Control de ventas de la campaña PcDays: unidades ofertadas vs. vendidas, resumen por gama y referencias fuera de campaña.',
    url: 'dashboard_pcdays_2026.html',
    updated: '2026-06-30',
    color: '#fc671a',
    colorDim: 'rgba(252,103,26,0.16)'
  },
  {
    icon: '📊',
    title: 'Ventas por Horas',
    desc: 'Comparativa de ventas hora a hora entre dos días, con acumulados, GMV y desglose por país y marca.',
    url: 'dashboard_sobremesa_horaxhora.html',
    updated: '2026-06-30',
    color: '#9da0a2',
    colorDim: 'rgba(157,160,162,0.16)'
  },
  {
    icon: '🔧',
    title: 'Consumo de Integración',
    desc: 'Cuota % de unidades por marca y familia de componente. Filtrable por año (2023–2026) y mes.',
    url: 'dashboard_consumo_integracion.html',
    updated: '2026-07-01',
    color: '#22c55e',
    colorDim: 'rgba(34,197,94,0.16)'
  },
];

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).replace('.', '').toUpperCase();
}

function render() {
  const grid = document.getElementById('grid');
  let html = DASHBOARDS.map((d, i) => `
    <a class="card" href="${d.url}" style="--card-color:${d.color};--card-color-dim:${d.colorDim}">
      <div class="card-top">
        <div class="card-icon">${d.icon}</div>
        <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      </div>
      <div class="card-title">${d.title}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-footer">
        <span class="updated">⟡ ${formatDate(d.updated)}</span>
        <span class="arrow">Abrir →</span>
      </div>
    </a>
  `).join('');

  html += `
    <div class="card-placeholder">
      <div class="plus">+</div>
      <div class="label">Próximo dashboard<br>se añadirá aquí</div>
    </div>
  `;

  grid.innerHTML = html;
}

render();
</script>
